<div class="discord">
  <div class="avatar-container">
    <img [src]="(avatarUrl$ | async)" class="avatar-img">
  </div>
  <div class="name-container" [ngClass]="{'logged-out': !(isLoggedIn$ | async)}">
    <span class="profile-name">{{ (userName$ | async) }}</span>

    @if (isLoggedIn$ | async) {
      <button mat-button (click)="logOut()" class="logout-button">
        <mat-icon>close</mat-icon>
      </button>
    }
  </div>
