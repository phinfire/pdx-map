<h2 mat-dialog-title>Rename Session</h2>
<mat-dialog-content>
  <mat-form-field appearance="outline" class="full-width">
    <mat-label>Session Name</mat-label>
    <input matInput [(ngModel)]="inputValue" placeholder="Enter new session name" autofocus>
  </mat-form-field>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button (click)="onCancel()">Cancel</button>
  <button mat-raised-button color="primary" (click)="onOk()">Rename</button>
</mat-dialog-actions>
